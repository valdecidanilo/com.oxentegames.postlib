<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

  <title>{{{ PRODUCT_NAME }}}</title>

  <link rel="shortcut icon" href="TemplateData/favicon.ico" />

  <link rel="preload" href="TemplateData/capa_mobile.webp" as="image" media="(max-width: 768px)" />
  <link rel="preload" href="TemplateData/capa_desktop.webp" as="image" media="(min-width: 769px)" />

  <link rel="stylesheet" href="TemplateData/style.css" />
  <link rel="stylesheet" href="TemplateData/start-button.css" />
  <link rel="stylesheet" href="Modules/Styles/main-panel.css" />
  <link rel="stylesheet" href="Modules/Styles/dev-tools.css" />

  <style>
    #cover-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: auto;
      transition: opacity 0.5s ease;
    }

    #cover-overlay.cover-active {
      opacity: 1;
      pointer-events: auto;
    }

    #cover-overlay.cover-hidden {
      opacity: 0;
      pointer-events: none;
    }

    #cover-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* Overlay de UI acima de tudo */
    #overlay-content {
      position: fixed;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 800px;
      padding: 0 20px;
    }
  </style>

  <script>
    window.IS_DEV_BUILD = {{{ DEVELOPMENT_PLAYER }}};
  </script>

  <!-- System Modules -->
  <script src="Modules/unity-modules.js"></script>
  <script src="Modules/url-search-params.js"></script>
  <script src="Modules/postlib.js"></script>

  <!-- Core Modules -->
  <script src="Modules/loader-utils.js"></script>
  <script src="Modules/loading-manager.js"></script>
  <script src="Modules/cover-manager.js"></script>
  <script src="Modules/game-config.js"></script>
  <script src="Modules/gate-manager.js"></script>
  <script src="Modules/devtools-manager.js"></script>

  <!-- Unity Loader -->
  <script src="Modules/unity-loader.js"></script>
  <script src="Modules/boot-manager.js"></script>
</head>

<body>

  <div id="bootGate" class="boot-gate">
    <div class="boot-card">
      <h3>Gate Setting Panel</h3>
      <p>Selected options will be used to load the game.</p>

      <div class="api-version-section" style="margin: 14px 0;">
        <label for="gameIDSelect" style="display:block; margin-bottom:6px; opacity:.9;">Games</label>
        <select id="gameIDSelect" class="api-select" style="width:100%; padding:10px; border-radius:8px;"></select>
      </div>
      <div class="api-version-section" style="margin: 14px 0;">
        <label for="apiVersionSelect" style="display:block; margin-bottom:6px; opacity:.9;">API Versions</label>
        <select id="apiVersionSelect" class="api-select" style="width:100%; padding:10px; border-radius:8px;"></select>
      </div>

      <div class="api-version-section" style="margin: 14px 0;">
        <label for="apiVersionSelect" style="display:block; margin-bottom:6px; opacity:.9;">User Name or TOKEN</label>
        <input type="text" id="playerNameInput" class="api-select" placeholder="Example: Joshep , As7snXHui76261..." />
      </div>
      <div id="gateMessage" style="display:none; margin-top:10px; color:red;"></div>
      <button id="btnLoadGame" class="opa-btn" style="width:100%; padding:12px; margin:8px 0;">Load Game</button>
      <button id="btnLoadDev" class="opa-btn secondary" style="width:100%; padding:12px; margin:8px 0;">Load with
        DevTools</button>
    </div>
  </div>

  <div id="unity-container">
    <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}}></canvas>
  </div>

  <div id="cover-overlay" class="cover-active">
    <img id="cover-image" src="" alt="Cover" />
  </div>

  <div id="overlay-content">
    <div id="unity-spinner"></div>

    <div id="unity-loading-container">
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
          <span id="unity-progress-text">0%</span>
        </div>

        <div id="unity-progress-info">
          <span id="unity-status-text">Loading...</span>
        </div>
      </div>

      <button id="btnStartGame" class="opa-btn" style="display:none;">
        Start Game
      </button>
    </div>

    <div id="unityPopup" style="display:none; margin-top:12px; padding:10px; border-radius:8px;">
      <span id="unityPopupText"></span>
    </div>
    <img id="unity-logo" src="TemplateData/logo_business.png" alt="Logo" />
    <div id="production-name">An Opa Production</div>
  </div>
<!-- Hyper Version -->
<div id="version-label" style="display:none; position:absolute; right:12px; bottom:12px; color:white; font-family:Arial; z-index: 99999;">
  --
</div>
<script>
  async function loadVersionInfo() {
    try {
      const response = await fetch("./StreamingAssets/version.json", { cache: "no-store" });
      if (!response.ok) throw new Error("version.json não encontrado");

      const data = await response.json();

      if (data.show_version) {
        let version = `v${data.release}`;

        if (data.build !== undefined && data.build !== null)
          version += `.${data.build}`;

        if (data.environment && data.environment !== "release")
          version += `-${data.environment}`;

        const label = document.getElementById("version-label");
        label.textContent = version;
        label.style.display = "block";
      }
    } catch (e) {
      console.warn("[Version] Falha ao carregar version.json:", e);
    }
  }

  window.HyperVersion_Show = function () {
    const label = document.getElementById("version-label");
    if (label) label.style.display = "block";
  };

  window.HyperVersion_Hide = function () {
    const label = document.getElementById("version-label");
    if (label) label.style.display = "none";
  };

  loadVersionInfo();
</script>
<!-- ============ -->
</body>

</html>
